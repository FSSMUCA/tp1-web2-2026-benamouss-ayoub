<!DOCTYPE html>

  <body>
    <h1>Exercice 4</h1>
    <!-- Votre contenu HTML ici -->

    <script>
    let prenom=window.prompt("Quel est votre prénom ?");
    let age=Number(window.prompt("Quel est votre âge ?"));
   
    let anneeNaissance=2025-age;
    window.alert(`Bonjour ${prenom} Vous êtes né vers ${anneeNaissance} `);
    if(window.confirm("Afficher dans la console ?"))
    {console.log(`${prenom} \n${age}\n ${anneeNaissance}`);}
     
     
     
    </script>
  </body>
</html>
