<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>TP JavaScript</title>
  </head>
  <body>
    <h1>Exercice 7</h1>
   <h1> Calculatrice de cercle</h1>
<div id="rayon"></div>
<div id="perimetre"></div>
<div id="surface"></div>

    <script>
      let rayon=Number(window.prompt("Donnez le rayon du cercle : "));
       
      const PI=Math.PI;
     
      let perimetre=2 * PI * rayon;
      let surface=PI * rayon * rayon;
      document.getElementById("rayon").innerHTML="le rayon est :" +rayon +"cm "
      document.getElementById("perimetre").innerHTML="le perimetre est :" +perimetre.toFixed(2) +"cm ";

      document.getElementById("surface").innerHTML="la surface est :" +surface.toFixed(2) +"cm ";

    </script>
  </body>
</html>
